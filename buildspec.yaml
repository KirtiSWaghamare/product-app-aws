version: 0.2
env:
  variables:
    AWS_ACCOUNT_ID: "855869818726"
    AWS_DEFAULT_REGION: "us-east-1"
    IMAGE_REPO_NAME: "product-app"
    IMAGE_TAG: "latest"

phases:
  install:
    runtime-versions:
      java: jdk21
    commands:
      - echo "Installing dependencies and verifying environment..."
      - java -version
      - chmod +x mvnw  
  pre_build:
    commands:
      - echo "Running Maven wrapper build..."
      - echo "mvnw file information:" && ls -l mvnw
      - echo "Attempting to run wrapper version check" && ./mvnw -v || echo "wrapper version check failed"
      - echo "Starting build with debug output"
      - ./mvnw -B -X clean install -DskipTests > build.log 2>&1 || (cat build.log && exit 1)
      - echo "Maven wrapper build completed (see build.log)"
      - echo "Logging in to Amazon ECR..."
      - aws --version
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')
  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building the Docker image..."
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Pushing the Docker images..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Writing image definitions file..."
      - printf '[{"name":"product-app-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - echo "Printing imagedefinitions.json content:"
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
  name: BuildArtifact
